<mat-card appearance="outlined">
  <mat-card-header>
    <mat-card-title>
      <h2>MUFI Lookup</h2>
    </mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <p>
      Note that
      <a href="https://mufi.info" target="_blank" rel="noopener">MUFI</a> does
      not provide an API service, so you need a server to host your own
      using API and import tools I developed for this purpose.
    </p>
    <div class="form-row">
      <cadmus-refs-lookup
        [service]="service"
        [item]="item()"
        [required]="true"
        label="MUFI"
        (itemChange)="onItemChange($event)"
        (moreRequest)="onMoreRequest()"
      />
      <!-- svg -->
      @if (item()?.svg) {
      <div id="glyph-box">
        <div
          [innerHTML]="
            item()?.svg || ''
              | replaceString : 'rgb(64,101,101)' : 'rgb(68,76,255)' : false
              | safeHtml
          "
        ></div>
      </div>
      }
    </div>
    @if (item()?.comment) {
    <div id="comment">{{ item()?.comment }}</div>
    }
    <!-- dump -->
    @if (item()) {
    <hr />
    <div>
      <pre>{{ item() | json }}</pre>
    </div>
    }
  </mat-card-content>
</mat-card>
